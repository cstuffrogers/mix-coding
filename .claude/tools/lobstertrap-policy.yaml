# Lobster Trap Policy — LLM Proxy Audit
# Detects proxy-injected tool calls, content tampering, and data exfiltration.
# Generated by /llm-proxy-audit

version: "1"
name: llm-proxy-audit

# ── Upstream: your real LLM API ──
upstream:
  url: "${DIRECT_API_URL:-https://api.anthropic.com/v1/messages}"
  timeout: 30s

# ── Inspection rules ──
rules:
  # --- Request inspection (egress from agent to API) ---
  - id: REQ-001
    direction: request
    description: "Detect tampered request payload"
    action: LOG
    match:
      path: "$.messages[*].content"
      pattern: "(?i)(send.*to.*http|exfiltrate|steal.*data|upload.*secret)"

  # --- Response inspection (ingress from API to agent) ---
  - id: RES-001
    direction: response
    severity: CRITICAL
    description: "Extra tool_use blocks beyond what was requested"
    action: DENY
    match:
      path: "$.content[?(@.type=='tool_use')]"
      # Lobster Trap counts tool_use in response vs tools in request

  - id: RES-002
    direction: response
    severity: CRITICAL
    description: "Unknown tool name in response"
    action: DENY
    match:
      path: "$.content[?(@.type=='tool_use')].name"
      pattern: "(?i)(upload_|send_to|exfiltrate|steal|dump_|leak_|post_to)"

  - id: RES-003
    direction: response
    severity: HIGH
    description: "Response contains webhook or external service URLs"
    action: DENY
    match:
      path: "$.content[?(@.type=='text')].text"
      pattern: "(?i)(https?://[^\s]*?(webhook|discord|telegram|slack|pastebin|ngrok|requestbin|beeceptor|pipedream|canarytokens)[^\s]*)"

  - id: RES-004
    direction: response
    severity: HIGH
    description: "Tool call parameters contain suspicious URLs"
    action: DENY
    match:
      path: "$.content[?(@.type=='tool_use')].input"
      pattern: "(?i)(https?://[^\s'"]*?(webhook|discord|telegram|slack|pastebin|ngrok)[^\s'"]*)"

  - id: RES-005
    direction: response
    severity: MEDIUM
    description: "Content mismatch — response content differs from expected pattern"
    action: LOG
    match:
      path: "$.content[?(@.type=='text')].text"
      pattern: "(?i)(\bprocess\.env\.(?!NODE_ENV|CI|VERCEL)[A-Z_]{3,})"

  - id: RES-006
    direction: response
    severity: HIGH
    description: "Response references .env or credential files"
    action: DENY
    match:
      path: "$.content[*].text"
      pattern: "(?i)(\.env|credentials\.json|private.*key|secret.*token)"

# ── Honeytool names — any tool call to these is confirmed attack ──
honeytools:
  - fetch_internal_config
  - sync_internal_cache
  - send_admin_notification
  - verify_user_credentials
  - export_analytics_report

# ── Logging ──
logging:
  level: info
  output: stdout
  audit_log: ".claude/tools/lobstertrap-audit.log"
