name: Mobile E2E Tests
on:
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'package.json'
  push:
    branches: [main]

jobs:
  e2e-detox:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run Detox Tests
        run: npx detox test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: artifacts/
